name: Despliegue Automático a Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout de código
        uses: actions/checkout@v3

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: 🏗️ Build Frontend
        run: |
          cd Conciliador_Web/frontend
          npm install
          npm run build

      - name: 🚀 Desplegar Frontend (Web)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./Conciliador_Web/frontend/dist/
          server-dir: ./
          state-name: .frontend-ftp-state

      - name: 🚀 Desplegar Backend (API)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./Conciliador_Web/backend/
          server-dir: ./api/
          state-name: .backend-ftp-state
          exclude: |
             **/__pycache__/**
             **/logs/**
             **/*.db
